<!-- Google Font -->

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  overflow: hidden;
}

/* 🌌 Animated Galaxy Background */
body::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle at 30% 30%, #1e3a8a, #020617, #0f172a);
  animation: galaxyMove 20s infinite linear;
  z-index: -1;
}

@keyframes galaxyMove {
  0% { transform: translate(0,0); }
  50% { transform: translate(-10%, -10%); }
  100% { transform: translate(0,0); }
}

/* Container */
.container {
  width: 90%;
  max-width: 400px;
  text-align: center;
}

/* Profile */
.profile img {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  margin-bottom: 10px;
}

.profile h2 {
  font-weight: 600;
}

.subtitle {
  font-size: 14px;
  opacity: 0.8;
  margin-bottom: 20px;
}

/* Buttons */
.link-btn {
  display: block;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  padding: 15px;
  margin: 12px 0;
  border-radius: 12px;
  text-decoration: none;
  color: white;
  font-weight: 600;
  transition: all 0.3s ease;
}

/* ✨ POP EFFECT */
.link-btn:hover {
  transform: scale(1.08);
  background: rgba(59,130,246,0.3);
  box-shadow: 0 0 20px rgba(59,130,246,0.6);
}

/* 🔥 Animated Text */
.animated-text {
  margin-top: 25px;
  font-size: 16px;
  opacity: 0.8;
  animation: floatText 3s ease-in-out infinite;
}

@keyframes floatText {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}
</style>
</head>

<body>

<div class="container">

  <!-- Profile -->
  <div class="profile">
